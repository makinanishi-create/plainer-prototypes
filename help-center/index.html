<style>
  :root{
    /* PLAINER brand (official palette) */
    --p-100:#E6E9FB; --p-200:#A9B1F3; --p-500:#4E62E2; --p-700:#3C4BBE; --p-900:#2D3A96;
    --g-100:#E9FBF2; --g-200:#C8F4DF; --g-300:#A4EBC1; --g-500:#72D6A0; --g-700:#4EB685;
    --ink:#1c2333;         /* navy-biased near-black for text */
    --body:#434343; --sub:#666666;
    --line:#e5e7f2;        /* cool light border (blue-biased neutral) */
    --line2:#eef0f8;
    --bg:#ffffff;
    --alert:#cc0000;
    --shadow:0 1px 2px rgba(45,58,150,.05), 0 8px 24px rgba(45,58,150,.06);
    --shadow-lift:0 10px 20px rgba(45,58,150,.10), 0 24px 48px rgba(45,58,150,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--body);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.8;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.16em;color:var(--p-500);text-transform:uppercase}

  /* ===== header ===== */
  header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  header .in{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:18px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .wm{font-size:19px;font-weight:800;letter-spacing:.03em;color:var(--p-500)}
  .brand .hc{font-size:12.5px;color:var(--sub);font-weight:600;border-left:1px solid var(--line);padding-left:12px}
  .hgap{flex:1}
  .hlink{font-size:13px;color:var(--body);font-weight:600}
  .hlink:hover{color:var(--p-500)}
  .hbtn{font-size:13px;font-weight:700;color:#fff;background:var(--p-500);border-radius:9px;padding:8px 15px}
  .hbtn:hover{background:var(--p-700)}

  /* ===== hero ===== */
  .hero{position:relative;overflow:hidden;background:
      radial-gradient(120% 120% at 15% 0%, var(--p-100) 0%, rgba(230,233,251,0) 55%),
      radial-gradient(120% 120% at 90% 10%, var(--g-100) 0%, rgba(233,251,242,0) 55%),
      #fff;
    border-bottom:1px solid var(--line)}
  .hero .in{max-width:760px;margin:0 auto;padding:64px 24px 56px;text-align:center}
  .hero h1{font-size:38px;line-height:1.4;letter-spacing:-.02em;color:var(--p-900);font-weight:800;margin:14px 0 12px;text-wrap:balance}
  .hero p{font-size:15.5px;color:var(--sub);margin:0 auto 26px;max-width:520px}
  .search{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:14px;
    padding:6px 6px 6px 16px;box-shadow:var(--shadow);max-width:600px;margin:0 auto;transition:.2s}
  .search:focus-within{border-color:var(--p-500);box-shadow:0 0 0 4px var(--p-100)}
  .search .mag{color:var(--p-500);font-size:17px}
  .search input{flex:1;border:none;outline:none;font-size:15px;padding:11px 0;background:transparent;color:var(--ink);font-family:inherit}
  .search .ai{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:#fff;
    background:linear-gradient(120deg,var(--p-500),var(--p-700));border-radius:10px;padding:11px 15px;white-space:nowrap}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
  .chips a{font-size:12.5px;color:var(--p-700);background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 13px}
  .chips a:hover{border-color:var(--p-200);background:var(--p-100)}
  .chips .lb{font-size:12px;color:var(--sub);align-self:center;margin-right:2px}

  /* ===== section frame ===== */
  section{padding:56px 0}
  .sec-h{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px}
  .sec-h h2{font-size:22px;font-weight:800;color:var(--p-900);letter-spacing:-.01em;margin:6px 0 0}
  .sec-h .more{font-size:13px;font-weight:700;color:var(--p-500);white-space:nowrap}
  .sec-h .more:hover{text-decoration:underline}

  /* ===== category grid ===== */
  .cats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .cat{display:block;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 22px 20px;box-shadow:var(--shadow);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;position:relative;overflow:hidden}
  .cat::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:linear-gradient(90deg,var(--p-500),var(--g-500));transform:scaleX(0);transform-origin:left;transition:transform .22s ease}
  .cat:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:var(--p-200)}
  .cat:hover::before{transform:scaleX(1)}
  .cat .ic{width:46px;height:46px;border-radius:13px;background:var(--p-100);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .cat .ic svg{width:23px;height:23px;stroke:var(--p-700);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .cat h3{font-size:15.5px;font-weight:800;color:var(--ink);margin:0 0 5px}
  .cat p{font-size:12px;color:var(--sub);margin:0 0 14px;line-height:1.7;min-height:1.7em}
  .cat .n{font-size:11.5px;font-weight:700;color:var(--p-500);font-variant-numeric:tabular-nums}

  /* ===== touch-demo feature band ===== */
  .feat{background:linear-gradient(120deg,var(--p-900),var(--p-700));border-radius:24px;overflow:hidden;color:#fff;
    display:grid;grid-template-columns:1fr 1fr;gap:0;box-shadow:var(--shadow-lift)}
  .feat .l{padding:44px 42px}
  .feat .badge{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:800;letter-spacing:.06em;
    background:rgba(114,214,160,.22);color:var(--g-300);border:1px solid rgba(114,214,160,.4);border-radius:999px;padding:5px 12px;margin-bottom:16px}
  .feat h2{font-size:27px;line-height:1.45;font-weight:800;margin:0 0 12px;letter-spacing:-.01em;color:#fff;text-wrap:balance}
  .feat p{font-size:14px;color:#cdd3f7;margin:0 0 22px}
  .feat .cta{display:inline-flex;align-items:center;gap:9px;background:var(--g-500);color:#123;font-weight:800;font-size:14px;border-radius:11px;padding:12px 20px}
  .feat .cta:hover{background:var(--g-300)}
  .feat .r{position:relative;background:rgba(255,255,255,.05);border-left:1px solid rgba(255,255,255,.08);padding:28px;display:flex;align-items:center;justify-content:center}
  /* mini PLAINER player still */
  .mini{width:100%;max-width:360px;background:#fff;border-radius:12px;box-shadow:0 20px 44px rgba(0,0,0,.3);overflow:hidden;color:var(--ink)}
  .mini .bar{height:30px;background:#f6f7fb;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;padding:0 11px}
  .mini .bar i{width:8px;height:8px;border-radius:50%}
  .mini .bar i:nth-child(1){background:#ff5f57}.mini .bar i:nth-child(2){background:#febc2e}.mini .bar i:nth-child(3){background:#28c840}
  .mini .body{position:relative;padding:16px 15px;height:172px;background:#fff}
  .mini .fakebtn{height:11px;border-radius:4px;background:#eef0f8;margin:0 0 9px}
  .mini .fakebtn.w1{width:60%}.mini .fakebtn.w2{width:85%}.mini .fakebtn.w3{width:45%}
  .mini .target{position:absolute;left:18px;top:96px;width:150px;height:34px;border-radius:8px;background:var(--p-100);
    box-shadow:0 0 0 2.5px var(--p-500),0 0 0 2000px rgba(28,35,51,.45);display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:700;color:var(--p-700);animation:mpulse 1.8s infinite}
  @keyframes mpulse{50%{box-shadow:0 0 0 5px var(--g-500),0 0 0 2000px rgba(28,35,51,.45)}}
  .mini .tip{position:absolute;left:20px;top:138px;background:var(--ink);color:#fff;font-size:11px;border-radius:9px;padding:8px 11px;max-width:210px;z-index:3;box-shadow:0 10px 24px rgba(0,0,0,.3)}
  .mini .tip::after{content:"";position:absolute;left:20px;top:-6px;width:11px;height:11px;background:var(--ink);transform:rotate(45deg)}

  /* ===== popular articles ===== */
  .pop{display:grid;grid-template-columns:1fr 1fr;gap:12px 34px}
  .pa{display:flex;align-items:center;gap:13px;padding:15px 4px;border-bottom:1px solid var(--line2)}
  .pa .no{font-size:13px;font-weight:800;color:var(--p-200);font-variant-numeric:tabular-nums;width:20px;text-align:center}
  .pa .t{flex:1;font-size:14px;font-weight:600;color:var(--ink)}
  .pa:hover .t{color:var(--p-500)}
  .pa .arr{color:var(--p-200);font-weight:800}
  .pa:hover .arr{color:var(--p-500)}

  /* ===== contact band ===== */
  .contact{text-align:center;background:var(--g-100);border:1px solid var(--g-200);border-radius:20px;padding:38px 24px}
  .contact h2{font-size:20px;font-weight:800;color:var(--p-900);margin:0 0 8px}
  .contact p{font-size:13.5px;color:var(--sub);margin:0 0 20px}
  .contact .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .contact .b1{background:var(--p-500);color:#fff;font-weight:700;font-size:14px;border-radius:11px;padding:12px 22px}
  .contact .b1:hover{background:var(--p-700)}
  .contact .b2{background:#fff;color:var(--p-700);font-weight:700;font-size:14px;border:1px solid var(--g-200);border-radius:11px;padding:12px 22px}

  /* ===== news & status band ===== */
  .news{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .newscard{display:flex;align-items:center;gap:15px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:19px 22px;box-shadow:var(--shadow);transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .newscard:hover{transform:translateY(-2px);border-color:var(--p-200);box-shadow:var(--shadow-lift)}
  .newscard .ic{width:44px;height:44px;border-radius:12px;background:var(--g-100);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .newscard .ic svg{width:22px;height:22px;stroke:var(--g-700);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .newscard .tx{flex:1;min-width:0}
  .newscard h3{font-size:15px;font-weight:800;color:var(--ink);margin:0 0 3px}
  .newscard p{font-size:12.5px;color:var(--sub);margin:0}
  .newscard .status{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--g-700)}
  .newscard .status::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--g-700);box-shadow:0 0 0 3px var(--g-100)}
  .newscard .arr{color:var(--p-200);font-weight:800;font-size:17px}
  .newscard:hover .arr{color:var(--p-500)}

  footer{border-top:1px solid var(--line);margin-top:20px}
  footer .in{max-width:1080px;margin:0 auto;padding:26px 24px;display:flex;align-items:center;gap:14px;font-size:12px;color:var(--sub)}
  footer .hgap{flex:1}

  .note{max-width:1080px;margin:22px auto 0;padding:12px 24px;font-size:11.5px;color:#98a1b5;text-align:center}

  @media(max-width:860px){
    .cats{grid-template-columns:repeat(2,1fr)}
    .feat{grid-template-columns:1fr}.feat .r{border-left:none;border-top:1px solid rgba(255,255,255,.08)}
    .pop{grid-template-columns:1fr}
    .news{grid-template-columns:1fr}
    .hero h1{font-size:29px}
  }
  @media(max-width:560px){.cats{grid-template-columns:1fr}.brand .hc{display:none}}
</style>

<script>
const $=s=>document.querySelector(s);
const stage=$('#stage');

const TOUR=[
  {sel:'#d-kebab',   screen:'list', b:'公開したいデモの <b>「︙」メニュー</b> を開きます。'},
  {sel:'#d-copyurl', screen:'menu', b:'<b>「公開URLコピー」</b> を選ぶと、このデモの公開URLがコピーされます。'},
  {sel:'#d-urlbar',  screen:'url',  b:'コピーしたURLの末尾に、MAツールのパラメータ <code>?pl_uid=…</code> を付けます。'},
  {sel:'#d-param',   screen:'param',b:'これで、メールから開いた人の <b>メールアドレスを特定</b> できます（アクセスデータの実名化）。', last:true},
];
let ti=0, playing=false, timer=null;

function setScreen(sc){
  $('#d-menu').style.display = (sc==='menu') ? 'block' : 'none';
  const up=$('#d-urlpanel'); up.style.display = (sc==='url'||sc==='param') ? 'flex' : 'none';
  $('#d-param').classList.toggle('show', sc==='param');
  if(sc==='url') toast();
}
function place(sel){
  const st=stage.getBoundingClientRect(), t=stage.querySelector(sel), tip=$('#d-tip');
  const hole=$('#d-hole'), hot=$('#d-hot'); tip.style.display='block';
  if(!t){hole.style.display='none';hot.style.display='none';tip.classList.remove('up');tip.style.left=(st.width/2-133)+'px';tip.style.top=(st.height/2-60)+'px';return;}
  const r=t.getBoundingClientRect(), p=6;
  const x=r.left-st.left-p, y=r.top-st.top-p, w=r.width+p*2, h=r.height+p*2;
  hole.style.display='block';hole.style.left=x+'px';hole.style.top=y+'px';hole.style.width=w+'px';hole.style.height=h+'px';
  hot.style.display='block';hot.style.left=x+'px';hot.style.top=y+'px';hot.style.width=w+'px';hot.style.height=h+'px';
  let ty=y+h+14, up=false;
  if(ty+150 > st.height-40){ ty=Math.max(8, y-158); up=true; }
  tip.classList.toggle('up',up);
  let tx=Math.min(Math.max(x,10), st.width-276);
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
}
function show(){
  const s=TOUR[ti];
  const prev = ti>0 ? TOUR[ti-1].screen : null;
  setScreen(s.screen);
  $('#d-fill').style.width=((ti+1)/TOUR.length*100)+'%';
  $('#d-cnt').textContent=(ti+1)+' / '+TOUR.length;
  $('#d-play').textContent=playing?'⏸ 一時停止':'▶ 再生';
  const delay = (s.screen!==prev) ? 340 : 60;
  clearTimeout(timer);
  setTimeout(()=>{
    place(s.sel);
    $('#d-tip').innerHTML=`<div class="th"><span class="a"></span><span class="nm">操作ガイド</span></div>
      <div class="b">${s.b}</div>
      <div class="f"><span class="i">${ti+1} / ${TOUR.length}</span><button class="nx" id="d-nx">${s.last?'完了 ✓':'次へ →'}</button></div>`;
    $('#d-nx').onclick=advance;
  }, delay);
  if(playing){ clearTimeout(timer); timer=setTimeout(advance, (s.last?2800:3400)+delay); }
}
function advance(){
  if(ti<TOUR.length-1){ ti++; show(); }
  else{ playing=false; $('#d-play').textContent='▶ 再生'; clearTimeout(timer); }
}
function toast(){const t=$('#d-toast');t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>t.style.display='none',2000);}
function play(){ playing=true; show(); }
function pause(){ playing=false; clearTimeout(timer); $('#d-play').textContent='▶ 再生'; }
function reset(){ clearTimeout(timer); ti=0; $('#d-menu').style.display='none'; $('#d-urlpanel').style.display='none'; $('#d-param').classList.remove('show'); }

$('#d-veil').onclick=advance;
$('#d-hot').onclick=advance;
$('#d-play').onclick=()=>{ playing?pause():play(); };
$('#d-replay').onclick=()=>{ reset(); play(); };
window.addEventListener('resize',()=>{ if($('#d-tip').style.display==='block') place(TOUR[ti].sel); });

$('#d-veil').style.display='block';
reset();
setTimeout(play, 700);
</script>

</template>
<script>
  var wrap = function(h){ return '<!doctype html><html lang="ja"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+h; };
  function plnav(name){ var t=document.getElementById('tpl-'+name); if(!t) return; document.getElementById('view').srcdoc = wrap(t.innerHTML); }
  window.addEventListener('message', function(e){ if(typeof e.data==='string' && e.data.indexOf('plnav:')===0) plnav(e.data.slice(6)); });
  plnav('top');
</script>
